name: Nightly Sync

on:
  schedule:
    - cron: "0 * * * *"  # once per hour, different cadence than Heartbeat's every-15-min
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Say hello
        run: echo "Syncing at $(date -u)"

      - name: Simulate longer baseline duration
        run: |
          # Longer typical runtime than Heartbeat, so avg_duration_min
          # visibly differs between the two workflows in the comparison
          # widget. Occasionally spikes higher, same as Heartbeat.
          SLEEP=$((60 + RANDOM % 120))
          if [ $((RANDOM % 6)) -eq 0 ]; then
            SLEEP=$((SLEEP + 300))
          fi
          echo "Sleeping ${SLEEP}s"
          sleep $SLEEP

      - name: Randomly fail
        run: |
          # Lower failure rate than Heartbeat's ~25%, so the comparison
          # widget shows two workflows with genuinely different health.
          if [ $((RANDOM % 8)) -eq 0 ]; then
            echo "Simulated failure"
            exit 1
          fi
          echo "OK"
